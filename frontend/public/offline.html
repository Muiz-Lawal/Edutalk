<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduTalk - Offline</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      background: white;
      border-radius: 12px;
      padding: 40px;
      max-width: 500px;
      text-align: center;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
    }
    
    .icon {
      font-size: 64px;
      margin-bottom: 20px;
    }
    
    h1 {
      color: #333;
      margin-bottom: 12px;
      font-size: 28px;
    }
    
    p {
      color: #666;
      margin-bottom: 24px;
      line-height: 1.6;
      font-size: 16px;
    }
    
    .offline-list {
      text-align: left;
      margin: 24px 0;
      background: #f5f5f5;
      padding: 16px;
      border-radius: 8px;
    }
    
    .offline-list h3 {
      color: #333;
      margin-bottom: 12px;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .offline-list ul {
      list-style: none;
    }
    
    .offline-list li {
      padding: 8px 0;
      color: #666;
      font-size: 14px;
    }
    
    .offline-list li::before {
      content: "✓ ";
      color: #667eea;
      font-weight: bold;
      margin-right: 8px;
    }
    
    .actions {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }
    
    button {
      flex: 1;
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .btn-primary {
      background: #667eea;
      color: white;
    }
    
    .btn-primary:hover {
      background: #5568d3;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }
    
    .btn-secondary {
      background: #f0f0f0;
      color: #333;
    }
    
    .btn-secondary:hover {
      background: #e0e0e0;
    }
    
    .status {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid #eee;
      color: #999;
      font-size: 13px;
    }
    
    .status-dot {
      width: 8px;
      height: 8px;
      background: #ff6b6b;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: 0.5;
      }
    }
    
    @media (max-width: 480px) {
      .container {
        padding: 30px 20px;
      }
      
      h1 {
        font-size: 24px;
      }
      
      p {
        font-size: 14px;
      }
      
      .actions {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    
    <h1>You're Offline</h1>
    
    <p>
      It looks like you've lost your internet connection. Don't worry! You can still access some content on EduTalk.
    </p>
    
    <div class="offline-list">
      <h3>Available Offline</h3>
      <ul>
        <li>Your saved courses</li>
        <li>Downloaded video content</li>
        <li>Your progress dashboard</li>
        <li>Offline notes & bookmarks</li>
      </ul>
    </div>
    
    <div class="actions">
      <button class="btn-primary" onclick="location.reload()">
        Try Again
      </button>
      <button class="btn-secondary" onclick="goHome()">
        Go Home
      </button>
    </div>
    
    <div class="status">
      <span class="status-dot"></span>
      <span>Waiting for connection...</span>
    </div>
  </div>
  
  <script>
    function goHome() {
      window.location.href = '/';
    }
    
    // Listen for connection restoration
    window.addEventListener('online', () => {
      location.reload();
    });
  </script>
</body>
</html>
